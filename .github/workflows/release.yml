name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  binaries:
    name: Binary (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: nodus
            archive_ext: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            binary_name: nodus
            archive_ext: tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            binary_name: nodus
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: nodus.exe
            archive_ext: zip

    env:
      ASSET_BASENAME: nodus-${{ github.event.release.tag_name }}-${{ matrix.target }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Package release archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          staging_dir="dist/${ASSET_BASENAME}"
          mkdir -p "${staging_dir}"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "${staging_dir}/nodus"
          cp README.md LICENSE "${staging_dir}/"
          tar -C dist -czf "dist/${ASSET_BASENAME}.tar.gz" "${ASSET_BASENAME}"

      - name: Package release archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $stagingDir = "dist/${env:ASSET_BASENAME}"
          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "$stagingDir/nodus.exe"
          Copy-Item README.md, LICENSE $stagingDir
          Compress-Archive -Path "$stagingDir/*" -DestinationPath "dist/${env:ASSET_BASENAME}.zip" -Force

      - name: Upload release archive
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ env.ASSET_BASENAME }}.${{ matrix.archive_ext }}
